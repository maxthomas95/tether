<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-j5VdZphEvM+FTgwhwir/dJYlVo2iRGVE/wWjxdDYlIw='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
    <title>Tether</title>
    <script>
      // Apply the saved theme before any CSS/JS runs. The main process
      // passes the theme name via ?theme=<name> on the URL (see
      // src/main/index.ts); the color values here mirror
      // src/shared/loader-themes.ts.
      //
      // We set the real --bg-primary / --text-primary / etc. variables
      // (not loader-specific ones) directly on document.documentElement.
      // Inline element styles outrank :root rules in any stylesheet, so
      // these values persist through global.css loading and remain in
      // effect until useTheme replaces them with the full theme. This
      // prevents a mocha flash for users on a non-default theme.
      (function () {
        var THEMES = {
          mocha:          { bg:'#1e1e2e', sidebar:'#181825', text:'#cdd6f4', muted:'#6c7086', accent:'#b4befe', border:'#313244' },
          macchiato:      { bg:'#24273a', sidebar:'#1e2030', text:'#cad3f5', muted:'#6e738d', accent:'#b7bdf8', border:'#363a4f' },
          frappe:         { bg:'#303446', sidebar:'#292c3c', text:'#c6d0f5', muted:'#737994', accent:'#babbf1', border:'#414559' },
          latte:          { bg:'#eff1f5', sidebar:'#e6e9ef', text:'#4c4f69', muted:'#9ca0b0', accent:'#7287fd', border:'#ccd0da' },
          'default-dark': { bg:'#1e1e1e', sidebar:'#252526', text:'#cccccc', muted:'#5a5a5a', accent:'#4fc1e9', border:'#3c3c3c' },
        };
        var match = /[?&]theme=([^&]+)/.exec(location.search);
        var name = match ? decodeURIComponent(match[1]) : 'mocha';
        var t = THEMES[name] || THEMES.mocha;
        var s = document.documentElement.style;
        s.setProperty('--bg-primary', t.bg);
        s.setProperty('--bg-sidebar', t.sidebar);
        s.setProperty('--text-primary', t.text);
        s.setProperty('--text-muted', t.muted);
        s.setProperty('--accent', t.accent);
        s.setProperty('--border-color', t.border);
      })();
    </script>
    <style>
      /* Inline boot styles — applied before global.css loads so the
         loading screen paints on the very first frame. React replaces
         #root's contents on mount, so this disappears automatically. */
      html, body, #root {
        height: 100%;
        margin: 0;
        background: var(--bg-primary, #1e1e2e);
        color: var(--text-primary, #cdd6f4);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }
      .tether-boot {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        -webkit-app-region: drag;
        user-select: none;
      }
      .tether-boot__title {
        /* Inline SVG sizes itself; height set on the <svg> attribute. */
        color: var(--text-primary, #cdd6f4);
        line-height: 0;
      }
      .tether-boot__title svg {
        display: block;
      }
      .tether-boot__sub {
        font-size: 12px;
        color: var(--text-muted, #6c7086);
      }
      .tether-boot__spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border-color, #313244);
        border-top-color: var(--accent, #b4befe);
        border-radius: 50%;
        animation: tether-boot-spin 0.8s linear infinite;
      }
      @keyframes tether-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="tether-boot">
        <div class="tether-boot__spinner"></div>
        <div class="tether-boot__title">
          <!-- Inline wordmark — kept in sync with src/renderer/assets/wordmark.svg
               and src/renderer/components/Wordmark.tsx. We inline it (rather than
               <img src=...>) so currentColor inherits from .tether-boot__title and
               the mark renders before the renderer bundle loads. -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 40" height="28" fill="currentColor" role="img" aria-label="Tether">
            <g font-family="'JetBrains Mono Variable','JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace" font-weight="600" font-size="32" letter-spacing="1.5" text-anchor="start" dominant-baseline="alphabetic">
              <text x="0" y="30">te</text>
              <text x="68" y="30">her</text>
            </g>
            <g transform="translate(46 4)" stroke-linejoin="round">
              <path d="M3 4 C 3 10 17 10 17 16 C 17 22 3 22 3 28" fill="none" stroke="currentColor" stroke-width="3.5" opacity="0.45" />
              <path d="M17 4 C 17 10 3 10 3 16 C 3 22 17 22 17 28" fill="none" stroke="currentColor" stroke-width="3.5" />
              <path d="M10 9 l2 1.5 l-2 1.5 l-2 -1.5 z" />
              <path d="M10 22 l2 1.5 l-2 1.5 l-2 -1.5 z" />
            </g>
          </svg>
        </div>
        <div class="tether-boot__sub">Loading workspace&hellip;</div>
      </div>
    </div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
