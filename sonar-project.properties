# SonarCloud configuration for Tether.
#
# Project key + organization are configured in the SonarCloud UI; this
# file only carries repo-local overrides.

# Files that are intentional data tables, not code: theme registries
# whose entries share the same field structure by design. CPD always
# flags these because adding a new entry duplicates the field shape of
# the existing N entries — there is no abstraction to extract without
# fighting the TypeScript types or making themes harder to read.
sonar.cpd.exclusions=src/renderer/styles/themes.ts,src/shared/loader-themes.ts,src/docs-renderer/index.ts
