# SonarCloud automatic analysis configuration for Tether.
#
# Automatic analysis ignores sonar-project.properties; this file carries
# repo-local overrides for the SonarCloud GitHub integration.

# Theme registries are intentional data tables whose entries share the same
# field structure by design. Exclude them from copy-paste detection so adding a
# theme does not fail the new-code duplication gate.
sonar.cpd.exclusions=src/renderer/styles/themes.ts,src/shared/loader-themes.ts,src/docs-renderer/index.ts
