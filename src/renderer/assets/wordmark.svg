<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tether wordmark.

  Monospaced "tether" lockup with a custom braid glyph bridging the "th".
  The letters render via SVG <text> using the same JetBrains Mono /
  Cascadia Code fallback stack as the rest of the UI; the braid is a
  hand-drawn path. Both render in currentColor so the parent's color
  cascade controls the tone (theme accent in the menubar, text-primary
  in the about dialog, etc.).

  The wordmark is decorative; consuming components must expose an
  accessible name (aria-label on the wrapper, alt on <img>).

  Design notes:
    - Layout cell: 28 units of advance per glyph at the rendered weight,
      yielding even rhythm. The braid sits in a half-cell (14 units)
      tucked between the t and the h so the lockup reads as one word
      with a knot bridging them, not as "te" + "her" with a separator.
    - The two strands cross twice — back strand recedes via opacity, the
      crossing pinch is a tiny diamond. This mirrors the rope twist in
      logo.png so the wordmark and mark feel related without aping the
      anchor itself.
    - The font-family on the <text> element is intentionally a stack
      (not a custom face) so the wordmark renders before any webfont
      load completes — important for the splash loader frame.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 144 40"
     fill="currentColor"
     role="img"
     aria-hidden="true">
  <!-- Letter group: "te"  +  braid  +  "her". The two halves use a
       fixed advance so the braid lands centered between t and h. -->
  <g font-family="'JetBrains Mono Variable','JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace"
     font-weight="600"
     font-size="32"
     letter-spacing="1.5"
     text-anchor="start"
     dominant-baseline="alphabetic">
    <text x="0" y="30">te</text>
    <text x="68" y="30">her</text>
  </g>

  <!-- Braid glyph bridging the "th" (centered around x≈56). Two strands
       cross twice. The over/under reads top-down: light strand passes
       over heavy strand at the upper crossing, under at the lower. -->
  <g transform="translate(46 4)" stroke-linejoin="round">
    <!-- Back strand (recessive) -->
    <path d="M3 4
             C 3 10  17 10  17 16
             C 17 22  3 22   3 28"
          fill="none" stroke="currentColor" stroke-width="3.5" opacity="0.45" />
    <!-- Front strand -->
    <path d="M17 4
             C 17 10  3 10   3 16
             C 3 22  17 22   17 28"
          fill="none" stroke="currentColor" stroke-width="3.5" />
    <!-- Crossover pinches (small diamonds at the two crossings, sells
         the woven illusion at small render sizes) -->
    <path d="M10 9 l2 1.5 l-2 1.5 l-2 -1.5 z" />
    <path d="M10 22 l2 1.5 l-2 1.5 l-2 -1.5 z" />
  </g>
</svg>
