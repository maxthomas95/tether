<?xml version="1.0" encoding="UTF-8"?>
<!--
  Active-session knot indicator.

  Replaces the 2px solid left border on .session-item--active with a
  thin vertical braid that mirrors the rope motif in the wordmark and
  the logo. Decorative only — must be aria-hidden in markup, or kept
  out of accessible name composition entirely (we render it as a CSS
  background-image on a ::before pseudo, which screen readers ignore).

  Sized small (~12px tall by default) and stroked in currentColor so
  the active sidebar item picks up --accent automatically.

  Drawn at viewBox 4×16 to keep it compact; the consuming pseudo
  element gives it a fixed pixel size and centers vertically.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 4 16"
     fill="none"
     stroke="currentColor"
     stroke-width="1.1"
     stroke-linecap="round"
     aria-hidden="true">
  <!-- Two strands that twist around each other twice. Cubic curves
       give the braid its rope-like cadence; the swap of which strand
       is "over" at the midpoint and the bottom sells the weave. -->
  <path d="M1 1 C 1 4  3 4  3 8  C 3 12  1 12  1 15"  opacity="0.55" />
  <path d="M3 1 C 3 4  1 4  1 8  C 1 12  3 12  3 15" />
</svg>
