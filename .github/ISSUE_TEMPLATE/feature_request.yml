name: Feature request
description: Suggest a scoped improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Tether do?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Anything explicitly out of scope?
    validations:
      required: false
